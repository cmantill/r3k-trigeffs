x-definitions:
    low_dr_cut: &low_dr_cut '(sqrt(pow(Electron_eta[0] - Electron_eta[1], 2) + pow( ((Electron_phi[0] - Electron_phi[1]) > 3.14159265 ? (Electron_phi[0] - Electron_phi[1]) - 2*3.14159265 : ((Electron_phi[0] - Electron_phi[1]) <= -3.14159265 ? (Electron_phi[0] - Electron_phi[1]) + 2*3.14159265 : (Electron_phi[0] - Electron_phi[1]))), 2)) < 0.3)'
    high_dr_cut: &high_dr_cut '(sqrt(pow(Electron_eta[0] - Electron_eta[1], 2) + pow( ((Electron_phi[0] - Electron_phi[1]) > 3.14159265 ? (Electron_phi[0] - Electron_phi[1]) - 2*3.14159265 : ((Electron_phi[0] - Electron_phi[1]) <= -3.14159265 ? (Electron_phi[0] - Electron_phi[1]) + 2*3.14159265 : (Electron_phi[0] - Electron_phi[1]))), 2)) > 0.3)'
    low_dxy_cut: &low_dxy_cut 'Electron_dxy[0] < 0.002 && Electron_dxy[1] < 0.002'
    high_dxy_cut: &high_dxy_cut 'Electron_dxy[0] > 0.002 && Electron_dxy[1] > 0.002'

